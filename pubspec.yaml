name: servlivo_customer_app
description: Servlivo — Home Services Booking App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Navigation
  go_router: ^14.0.0

  # Networking
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1
  web_socket_channel: ^3.0.0

  # Dependency Injection
  get_it: ^7.7.0

  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2

  # Network Connectivity
  connectivity_plus: ^6.0.0

  # Maps & Location
  google_maps_flutter: ^2.6.0
  geolocator: ^13.0.0
  geocoding: ^4.0.0

  # Payments
  razorpay_flutter: ^1.3.6

  # Media
  image_picker: ^1.1.0
  cached_network_image: ^3.3.1

  # Functional programming (error handling)
  dartz: ^0.10.1

  # Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^17.2.0

  # Icons
  font_awesome_flutter: ^10.7.0

  # Utilities
  intl: ^0.19.0
  timeago: ^3.6.0
  url_launcher: ^6.2.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.8

dependency_overrides:
  geolocator_android: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  bloc_test: ^9.1.7
  mocktail: ^1.0.3
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
